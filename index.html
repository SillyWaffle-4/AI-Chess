<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Super AI Chess</title>

<!-- jQuery (required) -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Chessboard CSS -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard.min.css">

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:#00ffd0;
}

#board{
width:500px;
margin:20px auto;
}

button{
padding:10px 18px;
font-size:16px;
background:#00ffd0;
border:none;
cursor:pointer;
}

button:hover{
background:#00c4a5;
}

input[type=range]{
width:300px;
}

#difficultyValue{
color:#00ffd0;
font-weight:bold;
}

</style>
</head>

<body>

<h1>Super AI Chess (Stockfish)</h1>

<div id="board"></div>

<p>
Difficulty:
<input type="range" id="difficulty" min="1" max="20" value="10">
<span id="difficultyValue">10</span>
</p>

<button onclick="resetGame()">Restart Game</button>

<p id="status"></p>

<!-- chess.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<!-- chessboard.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard.min.js"></script>

<script>

/* GAME */

var game = new Chess()

/* STOCKFISH */

var engine = new Worker("https://cdn.jsdelivr.net/npm/stockfish/stockfish.js")

/* BOARD */

var board = Chessboard('board', {
draggable: true,
position: 'start',
onDragStart: onDragStart,
onDrop: onDrop,
onSnapEnd: onSnapEnd
})

/* DIFFICULTY SLIDER */

var slider = document.getElementById("difficulty")
var diffText = document.getElementById("difficultyValue")

slider.oninput=function(){
diffText.innerText=this.value
}

/* PREVENT MOVING BLACK */

function onDragStart (source, piece) {

if (game.game_over()) return false

if (piece.search(/^b/) !== -1) return false

}

/* PLAYER MOVE */

function onDrop (source, target) {

var move = game.move({
from: source,
to: target,
promotion: 'q'
})

if (move === null) return 'snapback'

updateStatus()

setTimeout(makeAIMove,250)

}

/* SNAP */

function onSnapEnd () {
board.position(game.fen())
}

/* AI MOVE */

function makeAIMove(){

var depth = slider.value

engine.postMessage("position fen " + game.fen())
engine.postMessage("go depth " + depth)

engine.onmessage = function(event){

var line = event.data

if(line.startsWith("bestmove")){

var move = line.split(" ")[1]

game.move({
from: move.substring(0,2),
to: move.substring(2,4),
promotion: 'q'
})

board.position(game.fen())

updateStatus()

}

}

}

/* STATUS */

function updateStatus(){

var status=""

if(game.in_checkmate()){
status="Checkmate!"
}

else if(game.in_draw()){
status="Draw!"
}

else{

status="Your move"

if(game.in_check()){
status+=" (Check)"
}

}

document.getElementById("status").innerText=status

}

/* RESET */

function resetGame(){

game.reset()
board.start()
updateStatus()

}

updateStatus()

</script>

</body>
</html>
